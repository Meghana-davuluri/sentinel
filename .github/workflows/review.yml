name: Sentinel Review

# The reviewer agent reviews PRs on a TARGET repo (not Sentinel itself).
# Triggered manually so you choose which repo + PR to review.
on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Target repo (owner/name) to review"
        required: true
        default: "Meghana-davuluri/sentinel-demo"
      pr:
        description: "PR number to review"
        required: true
        default: "1"

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Agent - PRD/TDD review
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_GENAI_USE_VERTEXAI: "FALSE"
          GH_TOKEN: ${{ secrets.SENTINEL_REVIEW_TOKEN }}
        run: |
          uv run python -m app.review_pr \
            --repo "${{ github.event.inputs.repo }}" \
            --pr "${{ github.event.inputs.pr }}" \
            --post
