name: Sentinel Resolve Conflicts

# The conflict agent resolves merge conflicts on a PR in a TARGET repo.
# Triggered manually so you choose which repo + PR to resolve. Runs a DRY RUN
# by default; set push=true to actually commit and push the resolution.
on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Target repo (owner/name)"
        required: true
        default: "Meghana-davuluri/sentinel-demo"
      pr:
        description: "PR number with the conflict"
        required: true
        default: "3"
      push:
        description: "Commit + push the resolution (else dry run)"
        required: true
        default: "false"

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Configure git identity
        run: |
          git config --global user.name "Sentinel"
          git config --global user.email "sentinel@users.noreply.github.com"

      - name: Agent - resolve merge conflicts
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_GENAI_USE_VERTEXAI: "FALSE"
          GH_TOKEN: ${{ secrets.SENTINEL_REVIEW_TOKEN }}
        run: |
          PUSH_FLAG=""
          if [ "${{ github.event.inputs.push }}" = "true" ]; then
            PUSH_FLAG="--push"
          fi
          uv run python -m app.autoresolve_pr \
            --repo "${{ github.event.inputs.repo }}" \
            --pr "${{ github.event.inputs.pr }}" \
            $PUSH_FLAG
