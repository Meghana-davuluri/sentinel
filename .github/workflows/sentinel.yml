name: Sentinel

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $PR_TITLE"
          pattern='^(feat|fix|docs|chore|test|refactor|style|perf|build|ci)(\(.+\))?: .+'
          if echo "$PR_TITLE" | grep -qE "$pattern"; then
            echo "✅ Title follows Conventional Commits"
          else
            echo "❌ Title must be like 'feat: add login' (type: description)"
            exit 1
          fi

      - name: Check out code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra lint

      - name: Lint
        run: uv run ruff check .

      - name: Coverage (measure only, gate later)
        run: |
          uv run pytest tests/unit --cov=app --cov-report=term-missing || true
          echo "ℹ️ Coverage measured. 80% gate not enforced yet (no real tests exist)."

      - name: Agent - PRD/TDD review
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_GENAI_USE_VERTEXAI: "FALSE"
          GH_TOKEN: ${{ github.token }}
        run: |
          uv run python -m app.review_pr \
            --repo Meghana-davuluri/sentinel-demo \
            --pr 1 \
            --post

      - name: Agent - resolve conflicts
        run: echo "5. Agent resolves merge conflicts"

      - name: CI + revert on failure
        run: echo "6. CI runs; revert + reject if anything breaks"

      - name: Send summary email
        run: echo "7. Email contributor + repo owner"
