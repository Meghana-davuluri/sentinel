metrics_to_run:
  - verdict_correct

custom_metrics:
  - name: verdict_correct
    custom_function: |
      import json

      def evaluate(instance):
          # What the case expected: eval_case_id starts with "expect_reject" or "expect_approve".
          case_id = instance.get("eval_case_id", "")
          expected = "reject" if "expect_reject" in case_id else "approve"

          # The agent's final response text (structured JSON from the Review schema).
          response = instance.get("response") or {}
          parts = response.get("parts") or []
          text = " ".join(p.get("text", "") for p in parts)

          actual = ""
          try:
              actual = (json.loads(text) or {}).get("verdict", "")
          except Exception:
              # Fallback: look for the word in the raw text.
              low = text.lower()
              if "reject" in low:
                  actual = "reject"
              elif "approve" in low:
                  actual = "approve"

          score = 1.0 if actual == expected else 0.0
          return {
              "score": score,
              "explanation": f"expected={expected}, actual={actual or 'none'}",
          }
